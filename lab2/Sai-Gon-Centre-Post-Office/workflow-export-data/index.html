<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Central Post Office - Light Mode (Look-alike)</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      width: 100%;
      height: 100%;
      background: white;
    }
    
    .overlay-info {
      position: absolute;
      top: 15px;
      right: 15px;
      background: white;
      padding: 10px 15px;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      font-family: Arial, sans-serif;
      z-index: 100;
    }
    h2 { margin: 0; font-size: 16px; color: #333; }
    p { margin: 5px 0 0; font-size: 12px; color: #666; }

    /* Location Card (borrowed from script-approach) */
    #locationCard {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 220px;
      overflow: hidden;
      background: white;
      border-radius: 6px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      z-index: 100;
    }
    #locationCard img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .card-content { padding: 10px; font-size: 12px; color: #333; font-family: Arial, sans-serif; }
    .card-content h3 { margin: 0 0 6px; font-size: 14px; }
    .card-content p { margin: 0; color: #666; font-size: 11px; line-height: 1.4; }
  </style>

  <script src="script.js"></script>
</head>
<body>
  <div class="overlay-info">
    <h2>Saigon Central Post Office</h2>
    <p>Aesthetic: Light Mode</p>
    <button id="resetBtn" style="margin-top:8px;padding:6px 10px;border-radius:4px;background:#007acc;color:#fff;border:none;cursor:pointer;">RESET CAMERA</button>
  </div>

  <div id="locationCard">
    <img src="images/preview.png" alt="Central Post Office" />
    <div class="card-content">
      <h3>Central Post Office</h3>
      <p>District 1, Ho Chi Minh City. Built between 1886-1891 by Gustave Eiffel.</p>
    </div>
  </div>

  <div id="viewDiv"></div>
</body>
</html>
