          major: "Thiết kế đồ họa, Tiếng Việt và Văn hóa Việt Nam, Ngôn ngữ Anh, Quản lý kinh tế, Đông phương học, Truyền thông đa phương tiện, Quan hệ công chúng, Quản trị kinh doanh, Marketing, Kinh doanh thương mại, Tài chính – Ngân hàng, Công nghệ tài chính, Kế toán, Luật, Luật kinh tế, Công nghệ thông tin, Công nghệ kỹ thuật công trình xây dựng, Công nghệ kỹ thuật cơ khí, Công nghệ kỹ thuật ô tô, Công nghệ kỹ thuật điện – điện tử",
          students: "~20,000",
          location: "Vĩnh Long",
          longitude: 105.92763429411603,
          latitude: 10.16986345572417
        },
        {
          name: "Trường Đại học Nam Cần Thơ",
          founded: "2013",
          major: "Sức khỏe (Y đa khoa, Dược, Điều dưỡng, Kỹ thuật xét nghiệm), Kinh tế - Xã hội (Quản trị kinh doanh, Luật, Marketing), và Kỹ thuật - Công nghệ (CNTT, Kiến trúc, Xây dựng)",
          students: "~20,000",
          location: "Cần Thơ",
          longitude: 105.72293405310876,
          latitude: 10.007779142776547
        }
      ];

      function normalizeRoadPath(path) {
        if (!Array.isArray(path)) {
          return [];
        }

        const normalized = [];
        path.forEach(function (pt) {
          if (!Array.isArray(pt) || pt.length < 2) {
            return;
          }

          const lon = Number(pt[0]);
          const lat = Number(pt[1]);
          if (!Number.isFinite(lon) || !Number.isFinite(lat)) {
            return;
          }

          const last = normalized[normalized.length - 1];
          if (!last || last[0] !== lon || last[1] !== lat) {
            normalized.push([lon, lat]);
          }
        });

        return normalized;
      }

      const roads = allRoads
        .slice(0, 2 * n)
        .map(function (r) {
          return {
            name: r.name,
            type: r.type,
            length: r.length,
            rightofway: r.rightofway,
            provinces: r.provinces,
            path: normalizeRoadPath(r.path)
          };
        })
        .sort(function (a, b) {
          return a.name.localeCompare(b.name, "vi");
        });

      const universities = allUniversities
        .slice(0, 2 * n)
        .sort(function (a, b) {
          return a.name.localeCompare(b.name, "vi");
        });
      const requiredCount = 2 * n;

      if (roads.length !== requiredCount || universities.length !== requiredCount) {
        console.warn("Chưa đủ 2n dữ liệu. Cần", requiredCount, "tuyến và", requiredCount, "trường.");
      }

      // Starter Map
      const map = new Map({ basemap: "streets-vector" });

      const view = new MapView({
        container: "viewDiv",
        map,
        center: [105.55, 9.95],
        zoom: 7
      });

      view.popup.autoOpenEnabled = false;

      const locateWidget = new Locate({ view: view });
      view.ui.add(locateWidget, "top-left");

      const provincesLayer = new GraphicsLayer({ title: "Đơn vị hành chính" });
      const roadsLayer = new GraphicsLayer({ title: "Tuyến giao thông" });
      const universitiesLayer = new GraphicsLayer({ title: "Trường đại học" });

      const provinceColors = {
        "Cà Mau": [176, 224, 230, 0.35],
        "An Giang": [152, 251, 152, 0.35]
      };

      function addProvinceGraphicsFromGeoJSON() {
        function addFeatures(features) {
          const loadedUnits = {};

          (features || []).forEach(function (f) {
            const mergedName = f.properties.shapeName;
            if (!mergedStats[mergedName]) {
              return;
            }
            const componentNames = f.properties.components || mergedName;

            const geo = f.geometry;
            let polygons = [];
            if (geo.type === "Polygon" && Array.isArray(geo.coordinates)) {
              polygons = [geo.coordinates];
            } else if (geo.type === "MultiPolygon" && Array.isArray(geo.coordinates)) {
              polygons = geo.coordinates;
            } else {
              return;
            }

            loadedUnits[mergedName] = true;

            const info = mergedStats[mergedName] || { population: "Đang cập nhật", area: "Đang cập nhật" };
            const provinceColor = provinceColors[mergedName] || [52, 152, 219, 0.35];

            const polygonGeometries = polygons.map(function (poly) {
              return new Polygon({
                rings: poly,
                spatialReference: { wkid: 4326 }
              });
            });

            const dissolvedGeometry = polygonGeometries.length > 1
              ? geometryEngine.union(polygonGeometries)
              : polygonGeometries[0];

            provincesLayer.add(new Graphic({
              geometry: dissolvedGeometry,
              symbol: {
                type: "simple-fill",
                color: provinceColor,
                outline: { color: [0, 76, 153], width: 2 }
              },
              attributes: {
                name: mergedName,
                component: componentNames,
                population: info.population,
                area: info.area
              },
              popupTemplate: {
                title: "{name}",
                content: "<b>Thành phần cũ:</b> {component}<br/><b>Dân số:</b> {population}<br/><b>Diện tích:</b> {area}"
              }
            }));
          });

          return Object.keys(loadedUnits).length;
        }

        if (window.SOUTHERN_PROVINCES_GEOJSON && Array.isArray(window.SOUTHERN_PROVINCES_GEOJSON.features)) {
          const loadedCount = addFeatures(window.SOUTHERN_PROVINCES_GEOJSON.features);
          return Promise.resolve({ source: "local", loadedCount: loadedCount });
        }

        return esriRequest("https://raw.githubusercontent.com/wmgeolab/geoBoundaries/9469f09592ced973a3448cf66b6100b741b64c0d/releaseData/gbOpen/VNM/ADM1/geoBoundaries-VNM-ADM1.geojson", {
          responseType: "json"
        }).then(function (response) {
          const features = response.data.features || [];
          const loadedCount = addFeatures(features);
          return { source: "remote", loadedCount: loadedCount };
        });
      }

      roads.forEach(function (r, index) {
        roadsLayer.add(
          new Graphic({
            geometry: { type: "polyline", paths: [r.path] },
            symbol: { type: "simple-line", color: [231, 76, 60, 0.95], width: 3 },
            attributes: {
              road_no: index + 1,
              name: r.name,
              type: r.type,
              length: r.length,
              rightofway: r.rightofway,
              provinces: r.provinces
            },
            popupTemplate: {
              title: "{name}",
              content:
                "<b>Số thứ tự:</b> Tuyến #{road_no}<br/>" +
                "<b>Loại:</b> {type}<br/>" +
                "<b>Chiều dài:</b> {length}<br/>" +
                "<b>Lộ giới:</b> {rightofway}<br/>" +
                "<b>Đi qua:</b> {provinces}"
            }
          })
        );
      });

      const schoolIconSvg = "<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'><circle cx='24' cy='24' r='22' fill='#8fd3ff' stroke='#2b7bb9' stroke-width='2'/><path d='M24 10L10 17l14 7 14-7-14-7zm-9 11v11h18V21l-9 4-9-4zM22 24h4v8h-4z' fill='#ffffff'/></svg>";
      const fallbackUniIcon = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(schoolIconSvg);

      // Đặt logo trường tại thư mục ./assets/logos và ánh xạ tên trường ở đây.
      const universityLogos = {
        "Phân hiệu ĐHQG TP.HCM tại Bến Tre": "./assets/logos/ben-tre-quoc-gia_nobg.png",
        "Phân hiệu Trường Đại học Bình Dương tại Cà Mau": "./assets/logos/phan_hieu_dai_hoc_binh_duong_tai_ca_mau_nobg.png",
        "Trường Đại học An Giang - ĐHQG TP.HCM": "./assets/logos/Dai_hoc_An_Giang.svg_nobg.png"
      };

      function getUniversitySymbol(uniName) {
        return {
          type: "picture-marker",
          url: universityLogos[uniName] || fallbackUniIcon,
          width: "32px",
          height: "32px"
        };
      }

      universities.forEach(function (u, index) {
        universitiesLayer.add(
          new Graphic({
            geometry: { type: "point", longitude: u.longitude, latitude: u.latitude },
            symbol: getUniversitySymbol(u.name),
            attributes: {
              uni_no: index + 1,
              name: u.name,
              founded: u.founded,
              major: u.major,
              students: u.students,
              location: u.location
            },
            popupTemplate: {
              title: "{name}",
              content:
                "<b>Số thứ tự:</b> Trường #{uni_no}<br/>" +
                "<b>Tỉnh/TP:</b> {location}<br/>" +
                "<b>Năm thành lập:</b> {founded}<br/>" +
                "<b>Ngành đào tạo:</b> {major}<br/>" +
                "<b>Số lượng sinh viên:</b> {students}"
            }
          })
        );
      });

      map.addMany([provincesLayer, roadsLayer, universitiesLayer]);

      function findNearestUniversityGraphic(event, tolerancePx) {
        const maxDist = typeof tolerancePx === "number" ? tolerancePx : 20;
        let nearest = null;
        let minD2 = maxDist * maxDist;

        universitiesLayer.graphics.forEach(function (g) {
          const sp = view.toScreen(g.geometry);
          if (!sp) {
            return;
          }
          const dx = sp.x - event.x;
          const dy = sp.y - event.y;
          const d2 = dx * dx + dy * dy;
          if (d2 <= minD2) {
            minD2 = d2;
            nearest = g;
          }
        });

        return nearest;
      }

      // Ưu tiên popup theo thứ tự: trường đại học > tuyến đường > tỉnh.
      view.on("click", function (event) {
        const nearestUni = findNearestUniversityGraphic(event, 22);

        Promise.all([
          view.hitTest(event, { include: [universitiesLayer] }),
          view.hitTest(event, { include: [roadsLayer] }),
          view.hitTest(event, { include: [provincesLayer] })
        ]).then(function (hits) {
          const uniResults = (hits[0] && hits[0].results) ? hits[0].results.map(function (r) { return r.graphic; }) : [];
          const roadResults = (hits[1] && hits[1].results) ? hits[1].results.map(function (r) { return r.graphic; }) : [];
          const provinceResults = (hits[2] && hits[2].results) ? hits[2].results.map(function (r) { return r.graphic; }) : [];

          const ordered = [];
          const seen = new Set();

          function pushUnique(graphic) {
            if (!graphic || seen.has(graphic)) {
              return;
            }
            seen.add(graphic);
            ordered.push(graphic);
          }

          pushUnique(nearestUni);
          uniResults.forEach(pushUnique);
          roadResults.forEach(pushUnique);
          provinceResults.forEach(pushUnique);

          if (ordered.length) {
            view.popup.open({
              features: ordered,
              featureMenuOpen: false,
              location: event.mapPoint
            });
          }
        });
      });

      const hoverInfoEl = document.getElementById("hoverInfo");
      view.on("pointer-move", function (event) {
        const nearestUni = findNearestUniversityGraphic(event, 24);
        if (nearestUni && hoverInfoEl) {
          view.container.style.cursor = "pointer";
          hoverInfoEl.style.display = "block";
          hoverInfoEl.style.left = event.x + "px";
          hoverInfoEl.style.top = event.y + "px";
          hoverInfoEl.textContent = "Trường: " + (nearestUni.attributes.name || "");
          return;
        }

        view.hitTest(event).then(function (hit) {
          const results = (hit && hit.results) ? hit.results : [];

          let picked = results.find(function (r) {
            return r.graphic && r.graphic.layer === universitiesLayer;
          });
          let label = "";

          if (picked) {
            label = "Trường: " + (picked.graphic.attributes.name || "");
          } else {
            picked = results.find(function (r) {
              return r.graphic && r.graphic.layer === roadsLayer;
            });
            if (picked) {
              label = "Tuyến: " + (picked.graphic.attributes.name || "");
            } else {
              picked = results.find(function (r) {
                return r.graphic && r.graphic.layer === provincesLayer;
              });
              if (picked) {
                label = "Tỉnh/TP: " + (picked.graphic.attributes.name || "");
              }
            }
          }

          if (picked && hoverInfoEl) {
            view.container.style.cursor = "pointer";
            hoverInfoEl.style.display = "block";
            hoverInfoEl.style.left = event.x + "px";
            hoverInfoEl.style.top = event.y + "px";
            hoverInfoEl.textContent = label;
          } else if (hoverInfoEl) {
            view.container.style.cursor = "default";
            hoverInfoEl.style.display = "none";
          }
        });
      });

      view.when(function () {
        addProvinceGraphicsFromGeoJSON().then(function (result) {
          const provinceStatusEl = document.getElementById("provinceStatus");
          if (provinceStatusEl) {
            provinceStatusEl.textContent = "Đã tải ranh giới 8 đơn vị: " + result.loadedCount + "/8 (nguồn " + result.source + ")";
          }

          if (provincesLayer.graphics.length > 0) {
            view.goTo(provincesLayer.graphics.toArray()).catch(function () {
              // Ignore goTo interruptions from user interactions.
            });
          }

          console.log("Đã tải dữ liệu thực tế theo format Lab 1.");
          console.log("Số đơn vị sau sáp nhập hiển thị:", result.loadedCount);
          console.log("n =", n, "=> 2n cần đạt:", requiredCount, "| tuyến:", roads.length, "| trường:", universities.length);
        }).catch(function (error) {
          const provinceStatusEl = document.getElementById("provinceStatus");
          if (provinceStatusEl) {
            provinceStatusEl.textContent = "Không tải được ranh giới tỉnh. Kiểm tra Internet/CORS.";
          }
          console.error("Không tải được ranh giới tỉnh từ GeoJSON:", error);
        });
      });
    });
  </script>
</body>

</html>
